<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no,
    viewport-fit=cover
  "
/>

<title>Snake Chaos</title>

<style>

/* =========================================
RESET
========================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

/* =========================================
HTML / BODY
========================================= */

html,
body{

  width:100%;
  height:100%;

  overflow:hidden;

  overscroll-behavior:none;

  touch-action:none;

  user-select:none;

  -webkit-user-select:none;

  -webkit-touch-callout:none;

  -webkit-tap-highlight-color:transparent;

  background:#020617;

  color:white;
}

/* =========================================
BODY
========================================= */

body{

  display:flex;
  justify-content:center;
  align-items:center;

  background:
    radial-gradient(circle at top,#1e293b,#020617);

  background-size:400% 400%;

  animation:
    bgMove 12s ease infinite;
}

@keyframes bgMove{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* =========================================
ROTATE WARNING
========================================= */

.rotate-warning{

  display:none;

  position:fixed;

  inset:0;

  background:#020617;

  z-index:99999;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  text-align:center;

  padding:30px;
}

.rotate-warning h1{

  font-size:2.5rem;

  margin-bottom:20px;

  color:#38bdf8;
}

.rotate-warning p{

  font-size:1.2rem;

  opacity:.8;

  line-height:1.6;
}

/* =========================================
MOSTRA AVISO EM PÉ
========================================= */

@media (orientation: portrait){

  .rotate-warning{
    display:flex;
  }

  .game-wrapper{
    display:none;
  }
}

/* =========================================
GAME WRAPPER
========================================= */

.game-wrapper{

  width:100%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;
}

/* =========================================
GAME CONTAINER
========================================= */

.game-container{

  position:relative;

  overflow:hidden;

  width:min(95vw,1000px);

  padding:20px;

  border-radius:30px;

  border:
    2px solid rgba(255,255,255,.08);

  background:
    linear-gradient(
      135deg,
      rgba(15,23,42,.95),
      rgba(30,41,59,.95)
    );

  box-shadow:
    0 0 50px rgba(56,189,248,.15),
    inset 0 0 40px rgba(255,255,255,.02);

  backdrop-filter:blur(12px);
}

.game-container::before{

  content:"";

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.03),
      transparent
    );

  animation:
    shine 6s linear infinite;

  pointer-events:none;
}

@keyframes shine{

  from{
    transform:translateX(-100%);
  }

  to{
    transform:translateX(100%);
  }
}

/* =========================================
HEADER
========================================= */

.header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  flex-wrap:wrap;

  gap:15px;

  margin-bottom:25px;
}

.logo{

  font-size:2.5rem;

  font-weight:900;

  letter-spacing:1px;

  color:#38bdf8;

  text-shadow:
    0 0 20px rgba(56,189,248,.5);
}

/* =========================================
INFO
========================================= */

.info{

  display:flex;

  gap:12px;

  flex-wrap:wrap;
}

.card{

  position:relative;

  overflow:hidden;

  min-width:120px;

  padding:14px;

  border-radius:18px;

  text-align:center;

  backdrop-filter:blur(12px);

  transition:.3s;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.03)
    );

  border:
    1px solid rgba(255,255,255,.08);
}

.card span{

  display:block;

  opacity:.7;

  margin-bottom:6px;

  font-size:.8rem;
}

.card strong{

  font-size:1.3rem;

  color:#facc15;
}

/* =========================================
CANVAS
========================================= */

.canvas-wrapper{

  width:100%;

  display:flex;

  justify-content:center;
}

canvas{

  width:100%;

  max-width:900px;

  aspect-ratio:16/9;

  background:
    linear-gradient(
      135deg,
      #07111f,
      #0f172a
    );

  border-radius:25px;

  border:
    3px solid rgba(255,255,255,.08);

  box-shadow:
    0 0 30px rgba(0,0,0,.45),
    inset 0 0 30px rgba(255,255,255,.02);

  touch-action:none;

  -webkit-touch-callout:none;

  user-select:none;

  -webkit-user-select:none;
}

/* =========================================
MODAL
========================================= */

.modal{

  position:fixed;

  inset:0;

  background:
    rgba(0,0,0,.8);

  display:flex;

  justify-content:center;

  align-items:center;

  opacity:0;

  pointer-events:none;

  transition:.3s;

  z-index:999;
}

.modal.active{

  opacity:1;

  pointer-events:all;
}

.modal-content{

  width:min(95%,900px);

  padding:35px;

  border-radius:28px;

  background:
    linear-gradient(
      145deg,
      rgba(15,23,42,.98),
      rgba(30,41,59,.98)
    );

  border:
    2px solid rgba(255,255,255,.08);

  text-align:center;
}

.modal h2{

  font-size:2rem;

  margin-bottom:25px;

  color:#38bdf8;
}

/* =========================================
TIMER
========================================= */

.modal-timer{

  width:100%;

  height:20px;

  border-radius:999px;

  overflow:hidden;

  margin-bottom:30px;

  background:
    rgba(255,255,255,.06);
}

.modal-timer-bar{

  width:100%;

  height:100%;

  transition:1s linear;

  background:
    linear-gradient(
      90deg,
      #22c55e,
      #facc15,
      #ef4444
    );
}

/* =========================================
OPTIONS
========================================= */

.options{

  display:grid;

  grid-template-columns:
    repeat(3,1fr);

  gap:15px;
}

.option-btn{

  min-height:140px;

  border:none;

  border-radius:24px;

  padding:20px;

  font-size:1rem;

  font-weight:bold;

  color:white;

  cursor:pointer;

  transition:.3s;
}

.option-btn:nth-child(1){

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #b91c1c
    );
}

.option-btn:nth-child(2){

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #1d4ed8
    );
}

.option-btn:nth-child(3){

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #15803d
    );
}

.option-btn:hover{

  transform:
    scale(1.03);
}

/* =========================================
OVERLAY
========================================= */

.overlay{

  position:fixed;

  inset:0;

  background:
    rgba(0,0,0,.92);

  backdrop-filter:blur(10px);

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  gap:20px;

  opacity:0;

  pointer-events:none;

  transition:.3s;

  z-index:2000;
}

.overlay.active{

  opacity:1;

  pointer-events:all;
}

.overlay h1{

  font-size:4rem;
}

.restart-btn{

  border:none;

  border-radius:18px;

  padding:18px 28px;

  background:
    linear-gradient(
      135deg,
      #38bdf8,
      #2563eb
    );

  color:white;

  font-size:1rem;

  font-weight:bold;

  cursor:pointer;
}

/* =========================================
POPUP
========================================= */

.effect-popup{

  position:fixed;

  top:30px;

  left:50%;

  transform:
    translateX(-50%);

  min-width:350px;

  padding:22px;

  border-radius:22px;

  z-index:3000;

  text-align:center;

  opacity:0;

  pointer-events:none;

  transition:.4s;
}

.effect-popup.active{

  opacity:1;

  transform:
    translateX(-50%)
    translateY(10px);
}

.effect-popup.success{

  background:
    linear-gradient(
      135deg,
      rgba(34,197,94,.95),
      rgba(21,128,61,.95)
    );
}

.effect-popup.error{

  background:
    linear-gradient(
      135deg,
      rgba(239,68,68,.95),
      rgba(185,28,28,.95)
    );
}

/* =========================================
DARKNESS
========================================= */

.darkness{

  position:fixed;

  inset:0;

  background:black;

  opacity:0;

  pointer-events:none;

  transition:.5s;

  z-index:1500;
}

/* =========================================
RESPONSIVO
========================================= */

@media(max-width:900px){

  .options{

    grid-template-columns:1fr;
  }

  .logo{

    font-size:2rem;
  }

  .overlay h1{

    font-size:2.5rem;
  }
}

</style>
</head>

<body>

<!-- AVISO ROTAÇÃO -->

<div class="rotate-warning">

  <h1>
    📱 Vire o Celular
  </h1>

  <p>
    Este jogo foi desenvolvido
    para funcionar no modo
    horizontal.
  </p>

</div>

<!-- GAME -->

<div class="game-wrapper">

  <div class="game-container">

    <div class="header">

      <div class="logo">
        🐍 Snake Chaos
      </div>

      <div class="info">

        <div class="card">
          <span>Pontos</span>
          <strong id="scoreText">0</strong>
        </div>

        <div class="card">
          <span>Tamanho</span>
          <strong id="sizeText">3</strong>
        </div>

      </div>

    </div>

    <div class="canvas-wrapper">

      <canvas
        id="game"
        width="900"
        height="500">
      </canvas>

    </div>

  </div>

</div>

<!-- MODAL -->

<div
  class="modal"
  id="questionModal">

  <div class="modal-content">

    <h2 id="questionText"></h2>

    <div class="modal-timer">

      <div
        class="modal-timer-bar"
        id="modalTimerBar">
      </div>

    </div>

    <div
      class="options"
      id="optionsContainer">
    </div>

  </div>

</div>

<!-- OVERLAY -->

<div
  class="overlay"
  id="overlay">

  <h1>💀 GAME OVER</h1>

  <p id="finalScore"></p>

  <button
    class="restart-btn"
    onclick="location.reload()">

    Jogar Novamente

  </button>

</div>

<!-- POPUP -->

<div
  class="effect-popup"
  id="effectPopup">

  <h3 id="effectTitle"></h3>

  <p id="effectDescription"></p>

</div>

<div
  class="darkness"
  id="darkness">
</div>

<script>

/* =========================================
BLOQUEIOS MOBILE
========================================= */

window.addEventListener(

  "touchmove",

  (e)=>{

    e.preventDefault();

  },

  {
    passive:false
  }
);

document.addEventListener(

  "touchstart",

  (e)=>{

    if(e.touches.length > 1){

      e.preventDefault();
    }
  },

  {
    passive:false
  }
);

let lastTouchEnd = 0;

document.addEventListener(

  "touchend",

  (event)=>{

    const now = Date.now();

    if(now - lastTouchEnd <= 300){

      event.preventDefault();
    }

    lastTouchEnd = now;

  },

  false
);

/* =========================================
ORIENTATION LOCK
========================================= */

async function lockLandscape(){

  try{

    if(screen.orientation?.lock){

      await screen.orientation.lock(
        "landscape"
      );
    }

  }catch(err){

    console.log(
      "Orientation lock não suportado"
    );
  }
}

document.body.addEventListener(

  "click",

  ()=>{

    lockLandscape();

  },

  {
    once:true
  }
);

/* =========================================
JOGO
========================================= */

class SnakeChaos{

  constructor(){

    this.canvas =
      document.getElementById(
        "game"
      );

    this.ctx =
      this.canvas.getContext("2d");

    this.grid = 25;

    this.score = 0;

    this.speed = 60;

    this.gameRunning = true;

    this.snake = [

      {x:200,y:200},
      {x:175,y:200},
      {x:150,y:200}

    ];

    this.dx = this.grid;

    this.dy = 0;

    this.food =
      this.randomPosition();

    this.updateUI();

    document.addEventListener(

      "keydown",

      (e)=>this.changeDirection(e)
    );

    this.gameLoop();
  }

  randomPosition(){

    return{

      x:
        Math.floor(
          Math.random() *
          (this.canvas.width / this.grid)
        ) * this.grid,

      y:
        Math.floor(
          Math.random() *
          (this.canvas.height / this.grid)
        ) * this.grid
    };
  }

  changeDirection(e){

    const key = e.key;

    if(
      key === "ArrowUp" &&
      this.dy === 0
    ){

      this.dx = 0;
      this.dy = -this.grid;
    }

    if(
      key === "ArrowDown" &&
      this.dy === 0
    ){

      this.dx = 0;
      this.dy = this.grid;
    }

    if(
      key === "ArrowLeft" &&
      this.dx === 0
    ){

      this.dx = -this.grid;
      this.dy = 0;
    }

    if(
      key === "ArrowRight" &&
      this.dx === 0
    ){

      this.dx = this.grid;
      this.dy = 0;
    }
  }

  update(){

    const head = {

      x:
        this.snake[0].x + this.dx,

      y:
        this.snake[0].y + this.dy
    };

    if(

      head.x < 0 ||

      head.y < 0 ||

      head.x >= this.canvas.width ||

      head.y >= this.canvas.height

    ){

      this.gameOver();

      return;
    }

    for(let part of this.snake){

      if(

        head.x === part.x &&

        head.y === part.y

      ){

        this.gameOver();

        return;
      }
    }

    this.snake.unshift(head);

    if(

      head.x === this.food.x &&

      head.y === this.food.y

    ){

      this.food =
        this.randomPosition();

      this.score += 10;

      this.updateUI();

    }else{

      this.snake.pop();
    }
  }

  draw(){

    this.ctx.clearRect(

      0,
      0,

      this.canvas.width,

      this.canvas.height
    );

    this.ctx.fillStyle =
      "#ef4444";

    this.ctx.beginPath();

    this.ctx.arc(

      this.food.x + 12,

      this.food.y + 12,

      10,

      0,

      Math.PI * 2
    );

    this.ctx.fill();

    this.snake.forEach((part,index)=>{

      this.ctx.fillStyle =

        index === 0

        ? "#22c55e"

        : "#16a34a";

      this.ctx.fillRect(

        part.x,

        part.y,

        this.grid,

        this.grid
      );
    });
  }

  gameLoop(){

    if(!this.gameRunning)
      return;

    this.update();

    this.draw();

    setTimeout(()=>{

      requestAnimationFrame(()=>{

        this.gameLoop();

      });

    },this.speed);
  }

  updateUI(){

    document.getElementById(
      "scoreText"
    ).textContent =
      this.score;

    document.getElementById(
      "sizeText"
    ).textContent =
      this.snake.length;
  }

  gameOver(){

    this.gameRunning = false;

    const overlay =
      document.getElementById(
        "overlay"
      );

    overlay.classList.add(
      "active"
    );

    document.getElementById(
      "finalScore"
    ).innerHTML =

      `
      Pontuação:
      ${this.score}
      `;
  }
}

new SnakeChaos();

</script>
</body>
</html>
